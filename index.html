<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LuoYZ - 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            max-width: 700px;
            width: 100%;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 40px 45px;
            transition: 0.2s;
        }
        h1 {
            font-size: 32px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 6px;
        }
        .subhead {
            font-size: 18px;
            color: #475569;
            margin-bottom: 25px;
            border-bottom: 2px solid #e9edf2;
            padding-bottom: 20px;
        }
        .section {
            margin-bottom: 22px;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #0f172a;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .section-content {
            font-size: 16px;
            color: #1e293b;
            line-height: 1.7;
        }
        .section-content a {
            color: #2563eb;
            text-decoration: none;
            border-bottom: 1px dotted #94a3b8;
        }
        .section-content a:hover {
            border-bottom: 1px solid #2563eb;
        }
        .badge {
            display: inline-block;
            background: #eef2f6;
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 14px;
            color: #334155;
            margin-right: 8px;
            margin-bottom: 6px;
        }
        .footer {
            margin-top: 30px;
            padding-top: 18px;
            border-top: 1px solid #e9edf2;
            font-size: 14px;
            color: #64748b;
            text-align: center;
        }
        @media (max-width: 480px) {
            .card {
                padding: 25px 20px;
            }
            h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- 1. 姓名 + 身份 -->
        <h1>罗以梓 (Luo Yizhi)</h1>
        <div class="subhead">🎓 暨南大学准研究生 · 信科院人工智能</div>

        <!-- 2. 联系方式（邮箱必填！） -->
        <div class="section">
            <div class="section-title">📧 邮箱</div>
            <div class="section-content">
                <a href="mailto:tyummy178254@gmail.com">tyummy178254@gmail.com</a>
                <!-- ↑ 请换成你的真实邮箱 -->
            </div>
        </div>

        <!-- 3. 教育背景 -->
        <div class="section">
            <div class="section-title">🎓 教育经历</div>
            <div class="section-content">
                <strong>2026 – 至今</strong>  ·  即将入学暨南大学，人工智能（硕士）<br />
            </div>
        </div>

        <!-- 4. 研究兴趣 / 简介 -->
        <div class="section">
            <div class="section-title">🔬 研究兴趣</div>
            <div class="section-content">
                <span class="badge">社会模拟、教学模拟</span>
                <span class="badge">大语言模型</span>
                <span class="badge">知识图谱</span>
                <!-- 你可以自由增删这些标签 -->
            </div>
        </div>

        <!-- 5. 个人简介（可选，但会显得更真实） -->
        <div class="section">
            <div class="section-title">📝 关于我</div>
            <div class="section-content">
                我目前是一名准研究生，即将进入暨南大学攻读硕士学位。我对人工智能和大语言模型充满热情，尤其是如何让机器更好地理解和生成人类语言和行为。在入学前，我正在积极学习相关领域的论文和工具，期待未来的研究生活。
            </div>
        </div>

        <!-- 6. 其他链接（可选，但可以提高可信度） -->
        <div class="section">
            <div class="section-title">🔗 其他链接</div>
            <div class="section-content">
                <!-- <a href="#" target="_blank">GitHub</a> · 
                <a href="#" target="_blank">Google Scholar</a> · 
                <a href="#">个人简历（PDF）</a>
                如果你有的话，可以把 # 替换成真实链接；没有也可以删掉这行 -->
            </div>
        </div>

        <div class="footer">
            © 2026 罗以梓 · 本页面用于学术身份验证
        </div>
    </div>
</body>
</html>
